<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- Holding page. Drop this line once there is real content to index. -->
<meta name="robots" content="noindex">
<title>Raj Industries</title>
<!-- same families the auto repair site loads, so the two read as one brand -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0b; --surface:#111114; --border:#2a2a30;
    --text:#e8e8ec; --muted:#A9AEB5; --faint:#6E7078;
    --accent:#3ABEFF; --fire:#ff6a1a;
    --font-display:'Bebas Neue','Impact',sans-serif;
    --font-body:'Barlow','Helvetica Neue',sans-serif;
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    min-height:100dvh; display:grid; place-items:center; padding:2rem;
    background:var(--bg); color:var(--text);
    font-family:var(--font-body); line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  main { width:min(100%,44rem); text-align:center; }
  h1 {
    font-family:var(--font-display); font-weight:400;
    font-size:clamp(3rem,13vw,7rem); line-height:.92; letter-spacing:.02em;
    text-transform:uppercase;
  }
  h1 .mark { color:var(--fire); }
  .rule {
    width:4rem; height:2px; margin:2rem auto;
    background:linear-gradient(90deg,var(--fire),var(--accent));
  }
  a { color:var(--accent); text-decoration:none; }

  .term {
    display:inline-flex; align-items:baseline; gap:.6ch;
    padding:.85rem 1.2rem;
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:clamp(.82rem,2.6vw,1rem);
    background:var(--surface); border:1px solid var(--border); border-radius:3px;
    white-space:nowrap;
  }
  .term:hover { border-color:var(--accent); }
  .term .prompt { color:var(--fire); }
  .term .cmd { color:var(--text); }
  .term .host { color:var(--accent); }
  .caret {
    display:inline-block; width:.55ch; height:1em;
    background:var(--accent); translate:0 .12em;
    animation:blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity:0; } }
  @media (prefers-reduced-motion:reduce) { .caret { animation:none; } }

  .dedication {
    display:block; max-width:26rem; margin:4.5rem auto 0;
    padding:1.15rem 1.6rem;
    font-family:var(--font-body); font-size:.95rem; line-height:1.5;
    color:var(--muted); text-align:center;
    background:transparent; border:1px solid var(--border); border-radius:3px;
    cursor:pointer; transition:border-color .25s, color .25s, background .25s;
  }
  .dedication:hover, .dedication:focus-visible {
    color:var(--text); border-color:var(--fire);
    background:rgba(255,106,26,.06); outline:none;
  }
  .dedication .name { color:var(--fire); }
</style>
</head>
<body>

<main>
  <h1>Raj<span class="mark">.</span>Industries</h1>
  <div class="rule"></div>
  <a class="term" href="https://fixingfortmyers.com">
    <span class="prompt">&gt;</span><span class="cmd">open</span><span class="host">fixingfortmyers.com</span><span class="caret"></span>
  </a>

  <a class="dedication" href="https://manasa.fixingfortmyers.com">
    For <span class="name">Manasa</span>, my best friend and greatest inspiration
  </a>
</main>

</body>
</html>
